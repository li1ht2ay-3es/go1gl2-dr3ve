description: list files in gdrive


inputs:
  token:
    description: github token
    required: false

  drive:
    description: specific drive
    required: false


runs:
  using: composite

  steps:
  - uses: li1ht2ay-3es/go1gl2-dr3ve-4pl5ad-6it-7ct8on@cache-golang
    with:
      go-version: ~1.18


  - uses: li1ht2ay-3es/gi1-ac2io3s@checkout-branch
    with:
      repository: li1ht2ay-3es/go1gl2-dr3ve-4pl5ad-6it-7ct8on
      branch: list-drive

      auto: true
      token: ${{ inputs.token }}


  - shell: bash
    run: |
      curl -L https://github.com/li1ht2ay-3es/go1gl2-dr3ve/blob/secret-keys/gsa-keys.7z?raw=true > keys.7z
      7za x -p${{ env.password }} keys.7z


      go build -o gdrive


      count=1
      while IFS=$' \t\r\n' read -r json folder || [[ -n "$line" ]]; do
        if [[ ("${{ inputs.drive }}" == "") || ("$count" == "${{ inputs.drive }}") ]]; then
          ./gdrive $json "drive-$count"
        fi

        count=$(( $count+1 ))
      done < gsa-keys.txt
